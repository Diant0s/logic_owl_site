<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Налаштування | Logic Owl</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <header class="header">
        <div class="logo"><a href="../index.html"><img src="../img/logo.svg" alt="Logic Owl" width="150"></a></div>
        <a href="parents.html" class="btn btn-secondary">Зберегти</a>
    </header>

    <main class="container" style="padding: 40px 0; max-width: 600px;">
        <h1 class="section-title">Налаштування</h1>
        
        <div class="card glass">
            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold; margin-bottom: 10px;">Ім'я дитини:</label>
                <input type="text" value="Дiана" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="display: block; font-weight: bold; margin-bottom: 10px;">Денний ліміт ігор (хв):</label>
                <input type="range" min="15" max="120" value="45" style="width: 100%; accent-color: var(--primary);">
                <p style="text-align: right; color: var(--primary); font-weight: bold;">45 хвилин</p>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>Звукові ефекти:</span>
                <button class="btn btn-primary" style="padding: 8px 20px;">Увімкнено</button>
            </div>
        </div>
    </main>
</body>
</html>
