<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топ Совенят | Logic Owl</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="../index.html">
                <img src="../img/logo.svg" alt="Logic Owl" width="150">
            </a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="../index.html">Головна</a></li>
                <li><a href="parents.html">Батькам</a></li>
            </ul>
        </nav>
    </header>

    <main class="container" style="padding: 40px 0;">
        <section class="hero-content" style="text-align: center; margin-bottom: 40px;">
            <h1>Топ <span class="accent">Совенят</span> тижня 🏆</h1>
            <p>Змагайся, розв'язуй завдання та ставай наймудрішим!</p>
        </section>

        <div class="card glass" style="padding: 0; overflow: hidden;">
            <table class="rating-table" style="width: 100%; border-collapse: collapse;">
                <thead style="background: var(--bg-header); border-bottom: 2px solid var(--dark);">
                    <tr>
                        <th style="padding: 20px;">Місце</th>
                        <th style="text-align: left;">Герой</th>
                        <th>Бали</th>
                        <th>Рівень</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="top-player" style="border-bottom: 1px solid #ddd;">
                        <td style="text-align: center; font-size: 1.5rem;">🥇</td>
                        <td style="padding: 20px; font-weight: 700;">Артем "СуперМозок"</td>
                        <td style="text-align: center; color: var(--primary); font-weight: 800;">2,450</td>
                        <td style="text-align: center;">15</td>
                    </tr>
                    <tr style="border-bottom: 1px solid #ddd;">
                        <td style="text-align: center; font-size: 1.5rem;">🥈</td>
                        <td style="padding: 20px;">Марія-Дослідниця</td>
                        <td style="text-align: center;">2,100</td>
                        <td style="text-align: center;">12</td>
                    </tr>
                    <tr style="background: rgba(255, 122, 0, 0.1);">
                        <td style="text-align: center; font-weight: bold;">12</td>
                        <td style="padding: 20px;">Ти 🦉</td>
                        <td style="text-align: center;">1,450</td>
                        <td style="text-align: center;">9</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <p>© 2026 Logic Owl Project. Створено з любов'ю до знань.</p>
    </footer>
</body>
</html>
