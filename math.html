<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Гра: Математика | Logic Owl</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <a href="../index.html">
                <img src="../img/logo.svg" alt="Logic Owl" width="150">
            </a>
        </div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="../index.html#catalog">Каталог</a></li>
                <li><a href="rating.html">Рейтинг</a></li>
                <li><a href="parents.html">Батькам</a></li>
            </ul>
        </nav>
        <div class="game-status">💎 Бали: 450</div>
    </header>

    <main class="categories" style="min-height: 80vh;">
        <div style="max-width: 800px; margin: 0 auto; text-align: center;">
            <h2 class="section-title">Математичний квест</h2>

            <div class="help-zone">
                <details class="owl-help-details">
                    <summary class="btn btn-secondary help-trigger">
                        <span>🦉 Потрібна допомога?</span>
                    </summary>
                    <div class="hint-content glass fade-in">
                        <p><strong>Порада Сови:</strong> Відніми від результата вже відоме число!</p>
                    </div>
                </details>
            </div>
            
            <div class="card glass" style="margin-bottom: 40px; padding: 60px;">
                <span style="font-size: 4rem; display: block; margin-bottom: 20px;">10 + 🍎 = 15</span>
                <h3>Чому дорівнює яблучко?</h3>
            </div>

            <div class="card-grid" style="grid-template-columns: repeat(3, 1fr);">
                <button class="btn btn-primary" style="font-size: 1.5rem;">3</button>
                <button class="btn btn-primary" style="font-size: 1.5rem;">5</button>
                <button class="btn btn-primary" style="font-size: 1.5rem;">7</button>
            </div>
        </div>
    </main>
</body>
</html>
