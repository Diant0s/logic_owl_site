<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Просторова уява | Logic Owl</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <header class="header">
        <div class="logo"><a href="../index.html"><img src="../img/logo.svg" alt="Logic Owl" width="150"></a></div>
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="../index.html#catalog">Каталог</a></li>
                <li><a href="rating.html">Рейтинг</a></li>
                <li><a href="parents.html">Батькам</a></li>
            </ul>
        </nav>
        <div class="game-info">🌟 Бали: 1200</div>
    </header>

    <main class="categories">
        <div style="text-align: center; max-width: 900px; margin: 0 auto;">
            <h2 class="section-title">Знайди вигляд <span class="accent">зверху</span></h2>
            
            <div class="card glass" style="margin-bottom: 30px;">
                <div style="height: 250px; background: #eee; border-radius: 15px; display: flex; align-items: center; justify-content: center;">
                    <span style="font-size: 5rem;">🌳<br>🌳🌳</span>
                </div>
            </div>

            <div class="help-zone">
                <details class="owl-help-details">
                    <summary class="btn btn-secondary help-trigger">
                        <span>🦉 Потрібна допомога?</span>
                    </summary>
                    <div class="hint-content glass fade-in">
                        <p><strong>Порада Сови:</strong> Спробуй для початку з справжніми фігурками у себе на столі!</p>
                    </div>
                </details>
            </div>

            <div class="card-grid">
                <div class="card glass" style="border: 2px solid transparent;">
                    <img src="../img/option1.svg" alt="Варіант 1">
                    <button class="btn btn-primary" style="width: 100%; margin-top: 15px;">Обрати А</button>
                </div>
                <div class="card glass">
                    <img src="../img/option2.svg" alt="Варіант 2">
                    <button class="btn btn-primary" style="width: 100%; margin-top: 15px;">Обрати Б</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
