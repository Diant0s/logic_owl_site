<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід | Logic Owl</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body style="background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);">
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <main class="card glass" style="max-width: 450px; width: 100%; padding: 50px; animation: fadeIn 0.8s ease-out;">
            <div style="text-align: center; margin-bottom: 30px;">
                <img src="../img/logo.svg" alt="Logic Owl" width="180">
                <h2 style="margin-top: 20px;">Привіт, друже!</h2>
                <p style="color: var(--gray);">Введи свої дані, щоб почати гру</p>
            </div>

            <form action="#">
                <div style="margin-bottom: 20px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Твоє ім'я або Email</label>
                    <input type="text" style="width: 100%; padding: 15px; border-radius: 30px; border: 1px solid #ddd; outline: none;" placeholder="Наприклад, СуперСова">
                </div>
                <div style="margin-bottom: 30px; text-align: left;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Пароль</label>
                    <input type="password" style="width: 100%; padding: 15px; border-radius: 30px; border: 1px solid #ddd; outline: none;" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 15px;">Полетіли вчитися! 🚀</button>
            </form>

            <div style="margin-top: 25px; font-size: 0.9rem;">
                <a href="../index.html" style="color: var(--secondary); text-decoration: none;">Повернутися на головну</a>
            </div>
        </main>
    </div>
</body>
</html>
